name: Python ML Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 train.py --max-line-length=100 --ignore=E203,W503
      - name: Test imports
        run: python -c "from ultralytics import YOLO; print('YOLOv11 loaded successfully')"
      - name: Verify model training script
        run: python -c "import train; print('Training script syntax valid')"
